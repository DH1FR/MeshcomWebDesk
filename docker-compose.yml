services:
  meshcom-webdesk:
    build: .
    image: meshcom-webdesk:latest
    container_name: meshcom-webdesk
    restart: unless-stopped
    network_mode: host          # required for UDP RX from MeshCom device
    volumes:
      - ./logs:/app/logs        # persist log files
      - ./keys:/app/keys        # persist Data Protection keys (prevents antiforgery errors after restart)
      - ./data:/app/data        # persist chat state (tabs, MH list, monitor)
      - ./appsettings.json:/app/appsettings.json:ro   # override config
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Meshcom__DeviceIp=192.168.1.60
      - Meshcom__DevicePort=1799
      - Meshcom__ListenPort=1799
      - Meshcom__MyCallsign=DH1FR-2
      - Meshcom__LogPath=/app/logs
      - Meshcom__DataPath=/app/data
      # Env-Variablen überschreiben appsettings.json – nur setzen wenn nötig:
      # Meshcom__GroupFilterEnabled=true
      # Meshcom__Groups__0=#OE
      # Meshcom__Groups__1=#Test
